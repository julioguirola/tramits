name: Deploy Tramits

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: julioguirola/tramits-frontend:latest
          build-args: |
            VITE_API_URL=http://${{ vars.DOMAIN }}/api
      -
        name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: julioguirola/tramits-backend:latest
      - 
        name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.DOMAIN }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      - 
        name: Deploy via SSH
        run: |
          echo ${{ secrets.VM_SSH_KEY }} > ssh.key
          chmod 600 ./ssh.key
          ssh -i ./ssh.key opc@${{ vars.DOMAIN }} "sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d"
          
        